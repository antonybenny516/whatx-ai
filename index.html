<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatX.ai - Coming Soon</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Electrolize&family=Jockey+One&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Electrolize', sans-serif;
    background:#000;
    color:#fff;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.container{
    text-align:center;
    max-width:900px;
    padding:40px;
}

.logo{
    width:380px;
    max-width:80%;
    margin-bottom:50px;
}

h1{
    font-size: 2.5rem;;
    font-weight:700;
    line-height:1.2;
    /* letter-spacing:-1px; */
    color:#fff;
}

.gradient{
    background:linear-gradient(
        90deg,
        #0066ff,
        #1f8fff,
        #37c6ff
    );
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
}

.subtitle{
    margin-top:22px;
    font-size:1rem;
    color:rgba(255, 255, 255, 0.3);
    letter-spacing:3px;
    text-transform:uppercase;
    font-weight:400;
}

.glow{
    position:absolute;
    width:600px;
    height:600px;
    background:radial-gradient(
        circle,
        rgba(0,119,255,0.18) 0%,
        transparent 70%
    );
    filter:blur(80px);
    z-index:-1;
}

@media(max-width:768px){

    .logo{
        width:300px;
        margin-bottom:44px;
    }

    h1{
        font-size:2.5rem;
    }

    .subtitle{
        font-size:0.85rem;
        letter-spacing:2px;
    }
}
</style>
</head>
<body>

<div class="glow"></div>

<div class="container">

    <!-- Logo -->
    <img src="WhatX_logo_cropped.png" alt="WhatX.ai" class="logo">

    <br><br><br>

    <!-- Main Title -->
    <h1>
        THE <span class="gradient" style="font-weight: 900;">AI</span>
        REVOLUTION BEGINS HERE
    </h1>

    <br>
    
    <!-- Launching Soon -->
    <p class="subtitle">
        Website Launching Soon
    </p>

</div>

</body>
</html>
